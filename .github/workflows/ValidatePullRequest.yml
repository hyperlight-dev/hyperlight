# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Validate Pull Request

on:
  pull_request:
    branches: [main, "release/**"]
  merge_group:

# Cancels old running job if a new one is triggered (e.g. by a push onto the same branch).
# This will cancel dependent jobs as well, such as dep_rust and dep_fuzzing
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true    

permissions:
  contents: write
  pull-requests: write

jobs:
  docs-pr:
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.docs-only.outputs.result }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: changes
        with:
          filters: |
            docs:
              - '**/*.md'
              - '**/*.txt'
            all:
              - '**/*'
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        id: docs-only
        with:
          script: |
            let docs_file_count = ${{steps.changes.outputs.docs_count}};
            let all_file_count = ${{steps.changes.outputs.all_count}};
            return all_file_count === docs_file_count;
          result-encoding: string

  # Update guest Cargo.lock for Dependabot PRs.
  # Dependabot only updates the root Cargo.lock, leaving the guest workspace
  # Cargo.lock stale. This job updates it before code-checks runs
  # `cargo fetch --locked` so that the first CI run succeeds.
  update-guest-locks:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    uses: ./.github/workflows/dep_update_guest_locks.yml
    secrets: inherit

  # Build guests once, upload as artifacts for other jobs to download
  build-guests:
    needs: [docs-pr, update-guest-locks]
    # Required because update-guest-locks is skipped on non-dependabot PRs,
    # and a skipped dependency transitively skips all downstream jobs.
    # See: https://github.com/actions/runner/issues/2205
    if: ${{ !cancelled() && !failure() }}
    strategy:
      fail-fast: true
      matrix:
        config: [debug, release]
    uses: ./.github/workflows/dep_build_guests.yml
    secrets: inherit
    with:
      docs_only: ${{ needs.docs-pr.outputs.docs-only }}
      config: ${{ matrix.config }}

  # Code checks (fmt, clippy, MSRV) - runs in parallel with build-guests
  code-checks:
    needs: [docs-pr, update-guest-locks]
    # Required because update-guest-locks is skipped on non-dependabot PRs,
    # and a skipped dependency transitively skips all downstream jobs.
    # See: https://github.com/actions/runner/issues/2205
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/dep_code_checks.yml
    secrets: inherit
    with:
      docs_only: ${{ needs.docs-pr.outputs.docs-only }}

  # Build and test - needs guest artifacts
  build-test:
    needs:
      - docs-pr
      - build-guests
    # Required because update-guest-locks is skipped on non-dependabot PRs,
    # and a skipped dependency transitively skips all downstream jobs.
    # See: https://github.com/actions/runner/issues/2205
    if: ${{ !cancelled() && !failure() }}
    strategy:
      fail-fast: true
      matrix:
        hypervisor: ['hyperv-ws2025', mshv3, kvm]
        cpu: [amd, intel]
        config: [debug, release]
    uses: ./.github/workflows/dep_build_test.yml
    secrets: inherit
    with: 
      docs_only: ${{ needs.docs-pr.outputs.docs-only }}
      hypervisor: ${{ matrix.hypervisor }}
      cpu: ${{ matrix.cpu }}
      config: ${{ matrix.config }}

  # Run examples - needs guest artifacts, runs in parallel with build-test
  run-examples:
    needs:
      - docs-pr
      - build-guests
    # Required because update-guest-locks is skipped on non-dependabot PRs,
    # and a skipped dependency transitively skips all downstream jobs.
    # See: https://github.com/actions/runner/issues/2205
    if: ${{ !cancelled() && !failure() }}
    strategy:
      fail-fast: true
      matrix:
        hypervisor: ['hyperv-ws2025', mshv3, kvm]
        cpu: [amd, intel]
        config: [debug, release]
    uses: ./.github/workflows/dep_run_examples.yml
    secrets: inherit
    with: 
      docs_only: ${{ needs.docs-pr.outputs.docs-only }}
      hypervisor: ${{ matrix.hypervisor }}
      cpu: ${{ matrix.cpu }}
      config: ${{ matrix.config }}

  fuzzing:
    needs:
      - docs-pr
      - build-guests
    # Required because update-guest-locks is skipped on non-dependabot PRs,
    # and a skipped dependency transitively skips all downstream jobs.
    # See: https://github.com/actions/runner/issues/2205
    if: ${{ !cancelled() && !failure() }}
    uses: ./.github/workflows/dep_fuzzing.yml
    with:
      targets: '["fuzz_host_print", "fuzz_guest_call", "fuzz_host_call", "fuzz_guest_estimate_trace_event", "fuzz_guest_trace"]' # Pass as a JSON array
      max_total_time: 300 # 5 minutes in seconds
      docs_only: ${{ needs.docs-pr.outputs.docs-only }}
    secrets: inherit

  # Run benchmarks and post results as PR comment
  benchmarks:
    needs:
      - docs-pr
      - build-guests
    # Required because update-guest-locks is skipped on non-dependabot PRs,
    # and a skipped dependency transitively skips all downstream jobs.
    # See: https://github.com/actions/runner/issues/2205
    if: ${{ !cancelled() && !failure() }}
    strategy:
      fail-fast: false
      matrix:
        hypervisor: ['hyperv-ws2025', mshv3, kvm]
        cpu: [amd, intel]
    uses: ./.github/workflows/dep_benchmarks.yml
    secrets: inherit
    with:
      docs_only: ${{ needs.docs-pr.outputs.docs-only }}
      hypervisor: ${{ matrix.hypervisor }}
      cpu: ${{ matrix.cpu }}

  # Collect all benchmark reports and post a single combined PR comment
  benchmark-comment:
    needs: benchmarks
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download all benchmark reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: benchmark-report_*
          path: reports/

      - name: Post combined benchmark results to PR
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportsDir = 'reports';
            if (!fs.existsSync(reportsDir)) {
              console.log('No benchmark reports found, skipping comment.');
              return;
            }

            // Collect all report files from subdirectories
            const sections = [];
            const dirs = fs.readdirSync(reportsDir).sort();
            for (const dir of dirs) {
              const mdPath = path.join(reportsDir, dir, 'benchmark.md');
              if (!fs.existsSync(mdPath)) continue;

              // Extract hypervisor/cpu from artifact name: benchmark-report_OS_hypervisor_cpu
              const parts = dir.replace('benchmark-report_', '').split('_');
              const os = parts[0];
              const hypervisor = parts.slice(1, -1).join('_');
              const cpu = parts[parts.length - 1];
              const label = `${hypervisor} / ${cpu} (${os})`;

              const content = fs.readFileSync(mdPath, 'utf8').trim();
              sections.push(`<details>\n<summary><b>${label}</b></summary>\n\n${content}\n\n</details>`);
            }

            if (sections.length === 0) {
              console.log('No benchmark report content found, skipping comment.');
              return;
            }

            const body = `## Benchmark Results\n\n${sections.join('\n\n')}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

  spelling:
    name: spell check with typos
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
    - name: Spell Check Repo
      uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89  # v1.47.2

  license-headers:
    name: check license headers
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
    - name: Check License Headers
      run: ./dev/check-license-headers.sh

  # Gate PR merges on this specific "join-job" which requires all other
  # jobs to run first.
  report-ci-status:
    needs:
      - docs-pr
      - update-guest-locks
      - build-guests
      - code-checks
      - build-test
      - run-examples
      - fuzzing
      - benchmarks
      - benchmark-comment
      - spelling
      - license-headers
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: calculate the correct exit status
        run: jq --exit-status 'all(.result == "success" or .result == "skipped")' <<< '${{ toJson(needs) }}'
