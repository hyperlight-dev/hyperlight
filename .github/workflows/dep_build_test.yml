# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build and Test

on:
  workflow_call:
    inputs:
      docs_only:
        description: Skip building if docs only
        required: false
        type: string
        default: "false"
      pool:
        description: 1ES pool name for this run
        required: true
        type: string
      config:
        description: Build configuration for this run (passed from caller matrix)
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    if: ${{ inputs.docs_only == 'false' }}
    timeout-minutes: 45
    runs-on: ["self-hosted", "Windows", "X64", "1ES.Pool=${{ inputs.pool }}"] 
    steps:
      - uses: actions/checkout@v6

      - name: Diagnose Hyper-V status
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host "=== Windows Version ==="
          cmd /c ver
          Write-Host "`n=== Hyper-V Features ==="
          Get-WindowsOptionalFeature -Online | Where-Object {$_.FeatureName -match 'Hyper-V|HypervisorPlatform|VirtualMachinePlatform'} | Format-Table
          Write-Host "`n=== Hyper-V Services ==="
          Get-Service -Name vmcompute,vmms -ErrorAction SilentlyContinue | Format-Table Name,Status,StartType
          Write-Host "`n=== WHP API Check ==="
          $whpDll = "$env:SystemRoot\System32\WinHvPlatform.dll"
          if (Test-Path $whpDll) { Write-Host "WinHvPlatform.dll found: $((Get-Item $whpDll).VersionInfo.FileVersion)" } else { Write-Host "WinHvPlatform.dll NOT FOUND" }
          Write-Host "`n=== Hypervisor Present (firmware) ==="
          (Get-WmiObject Win32_ComputerSystem).HypervisorPresent
          Write-Host "`n=== BCDEdit hypervisor launch type ==="
          bcdedit /enum '{current}' | Select-String -Pattern 'hypervisor'

      - uses: hyperlight-dev/ci-setup-workflow@v1.8.0
        with:
          rust-toolchain: "1.89"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix cargo home permissions
        if: runner.os == 'Linux'
        run: |
          sudo chown -R $(id -u):$(id -g) /opt/cargo || true

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ runner.os }}-${{ inputs.config }}"
          cache-on-failure: "true"

      - name: Download Rust guests
        uses: actions/download-artifact@v8
        with:
          name: rust-guests-${{ inputs.config }}
          path: src/tests/rust_guests/bin/${{ inputs.config }}/

      - name: Download C guests
        uses: actions/download-artifact@v8
        with:
          name: c-guests-${{ inputs.config }}
          path: src/tests/c_guests/bin/${{ inputs.config }}/

      - name: Download interface.wasm
        uses: actions/download-artifact@v8
        with:
          name: interface-wasm
          path: src/tests/rust_guests/witguest/

      - name: Download twoworlds.wasm
        uses: actions/download-artifact@v8
        with:
          name: twoworlds-wasm
          path: src/tests/rust_guests/witguest/

      - name: Build
        run: just build ${{ inputs.config }}

      - name: Run Miri tests
        if: runner.os == 'Linux'
        run: just miri-tests

      - name: Run Rust tests
        run: |
          # with default features
          just test ${{ inputs.config }}

      - name: Run Rust tests with single driver
        if: runner.os == 'Linux'
        run: |
          # with only one driver enabled (kvm/mshv3 features are unix-only, no-op on Windows)
          just test ${{ inputs.config }}

      - name: Run Rust Gdb tests
        env:
          RUST_LOG: debug
        run: just test-rust-gdb-debugging ${{ inputs.config }}

      - name: Run Rust Crashdump tests
        env:
          RUST_LOG: debug
        run: just test-rust-crashdump ${{ inputs.config }}

      - name: Run Rust Tracing tests
        if: runner.os == 'Linux'
        env:
          RUST_LOG: debug
        run: just test-rust-tracing ${{ inputs.config }}
